<!DOCTYPE html>
<html lang="fr">
<head>

<title>Spring Boot Révision</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page">

    <div class="sidebar">

        <h3>SPRING BOOT</h3>
       
        <div class="step active" data-page="architecture">
            <span class="dot"></span>
            <div>
                <small>01</small>
                <p>Architecture</p>
            </div>
        </div>
        
        <div class="step" data-page="installation">
            <span class="dot"></span>
            <div>
                <small>02</small>
                <p>Installation</p>
            </div>
        </div>
        
        <div class="step" data-page="maven">
            <span class="dot"></span>
            <div>
                <small>03</small>
                <p>Maven / pom.xml</p>
            </div>
        </div>
        
        <div class="step" data-page="tomcat">
            <span class="dot"></span>
            <div>
                <small>04</small>
                <p>Tomcat</p>
            </div>
        </div>
        
        <div class="step" data-page="properties">
            <span class="dot"></span>

            <span class="dot"></span>

            <div>

            <span class="dot"></span>
            <div>

                <p>Projet</p>
            </div>
        </div>
        <div class="step" data-page="quiz">
            <span class="dot"></span>
            <div>
                <small>10</small>
                <p>Quiz</p>

    <div class="content" id="content">
       
    </div>

<script src="js/app.js"></script>
